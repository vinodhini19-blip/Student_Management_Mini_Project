<!DOCTYPE html>
<html>
<head>

<title>Add Activity</title>
<link rel="stylesheet" href="css/style.css">

<style>

.activity-section{
display:flex;
justify-content:center;
align-items:center;
padding:80px 20px;
background:#fff4f1;
}

.activity-card{
width:600px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.1);
}

.activity-card h2{
text-align:center;
margin-bottom:25px;
color:#ff6f61;
}

.form-group{
margin-bottom:15px;
}

.form-group label{
display:block;
margin-bottom:5px;
}

.form-group input,
.form-group select,
.form-group textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.form-buttons{
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<nav>
<div class="container nav-container">

<h2 class="logo">StudentMS</h2>

<ul>
<li><a href="dashboard.php">Dashboard</a></li>
<li><a href="logout.php">Logout</a></li>
</ul>

</div>
</nav>

<main>

<section class="activity-section">

<div class="activity-card">

<h2>Add Activity</h2>

<form action="php/save_activity.php" method="POST">

<div class="form-group">
<label>Student Name</label>
<input type="text" name="student_name" required>
</div>

<div class="form-group">
<label>Activity Name</label>
<input type="text" name="activity_name" required>
</div>

<div class="form-group">
<label>Event Date</label>
<input type="date" name="event_date">
</div>

<div class="form-group">
<label>Participation Level</label>

<select name="level">

<option value="Participant">Participant</option>
<option value="Winner">Winner</option>
<option value="Runner">Runner</option>

</select>

</div>

<div class="form-group">
<label>Remarks</label>
<textarea name="remarks"></textarea>
</div>

<div class="form-buttons">
<button class="btn">Submit</button>
<button type="reset" class="btn">Reset</button>
</div>

</form>

</div>

</section>

</main>

<footer>
<p>© 2026 Student Activity Management System | Developed by Vino</p>
</footer>

</body>
</html>
